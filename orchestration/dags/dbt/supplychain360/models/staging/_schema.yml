version: 2

models:

  - name: stg_s3__products
    description: >
      Cleaned and deduplicated product reference data.
      One row per product.
    columns:
      - name: product_id
        description: Unique identifier for each product
        data_tests:
          - unique
          - not_null

      - name: product_name
        description: Display name of the product
        data_tests:
          - not_null

      - name: product_brand
        description: Brand the product belongs to
        data_tests:
          - not_null

      - name: product_category
        description: Category the product belongs to
        data_tests:
          - not_null

      - name: unit_price
        description: Standard unit price of the product
        data_tests:
          - not_null

      - name: supplier_id
        description: Foreign key to the suppliers table
        data_tests:
          - not_null


  - name: stg_s3__suppliers
    description: >
      Cleaned and deduplicated supplier reference data.
      One row per supplier.
    columns:
      - name: supplier_id
        description: Unique identifier for each supplier
        data_tests:
          - unique
          - not_null

      - name: supplier_name
        description: Name of the supplier
        data_tests:
          - not_null

      - name: supplier_category
        description: Category of products the supplier provides
        data_tests:
          - not_null

      - name: supplier_country
        description: Country where the supplier is based
        data_tests:
          - not_null

  - name: stg_s3__warehouses
    description: >
      Cleaned and deduplicated warehouse reference data.
      One row per warehouse. Region is not present here
      and is derived in dim_warehouse via a join to stg_stores.
    columns:
      - name: warehouse_id
        description: Unique identifier for each warehouse
        data_tests:
          - unique
          - not_null

      - name: warehouse_city
        description: City where the warehouse is located
        data_tests:
          - not_null

      - name: warehouse_state
        description: State where the warehouse is located
        data_tests:
          - not_null

  - name: stg_gsheets__stores
    description: >
      Cleaned and deduplicated store reference data.
      One row per store. Region is already present in source.
    columns:
      - name: store_id
        description: Unique identifier for each store
        data_tests:
          - unique
          - not_null

      - name: store_name
        description: Display name of the store
        data_tests:
          - not_null

      - name: store_city
        description: City where the store is located
        data_tests:
          - not_null

      - name: store_state
        description: State where the store is located
        data_tests:
          - not_null

      - name: store_region
        description: Region the store belongs to
        data_tests:
          - not_null
          - accepted_values:
              values: ['West', 'South', 'Midwest', 'East']

      - name: store_open_date
        description: Date the store opened
        data_tests:
          - not_null


  - name: stg_s3__inventory
    description: >
      Cleaned daily inventory snapshots per product per warehouse.
      One row per product per warehouse per snapshot date.
    columns:
      - name: product_id
        description: Foreign key to products
        data_tests:
          - not_null

      - name: warehouse_id
        description: Foreign key to warehouses
        data_tests:
          - not_null

      - name: snapshot_date
        description: Date the inventory snapshot was taken
        data_tests:
          - not_null

      - name: quantity_available
        description: Stock quantity available on this date
        data_tests:
          - not_null

      - name: reorder_threshold
        description: Stock level at which a stockout is flagged
        data_tests:
          - not_null

  - name: stg_s3__shipments
    description: >
      Cleaned shipment records with delivery dates.
      One row per shipment.
    columns:
      - name: shipment_id
        description: Unique identifier for each shipment
        data_tests:
          - unique
          - not_null

      - name: warehouse_id
        description: Foreign key to warehouses
        data_tests:
          - not_null

      - name: store_id
        description: Foreign key to stores
        data_tests:
          - not_null

      - name: product_id
        description: Foreign key to products
        data_tests:
          - not_null

      - name: quantity_shipped
        description: Quantity of product shipped
        data_tests:
          - not_null

      - name: shipment_date
        description: Date the shipment was dispatched
        data_tests:
          - not_null

      - name: expected_delivery_date
        description: Date the shipment was expected to arrive
        data_tests:
          - not_null

      - name: carrier
        description: Carrier responsible for the shipment
        data_tests:
          - not_null

  - name: stg_postgres__sales
    description: >
      Cleaned sales transaction records.
      One row per transaction.
    columns:
      - name: transaction_id
        description: Unique identifier for each transaction
        data_tests:
          - unique
          - not_null

      - name: store_id
        description: Foreign key to stores
        data_tests:
          - not_null

      - name: product_id
        description: Foreign key to products
        data_tests:
          - not_null

      - name: quantity_sold
        description: Number of units sold in this transaction
        data_tests:
          - not_null

      - name: unit_price
        description: Price per unit at time of sale
        data_tests:
          - not_null

      - name: sale_amount
        description: Total sale amount after discount
        data_tests:
          - not_null

      - name: transaction_date
        description: Date the transaction occurred
        data_tests:
          - not_null

      - name: transaction_timestamp
        description: Full timestamp of the transaction
        data_tests:
          - not_null